<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CrimsonZone — 404</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
    .four{font-family:var(--font-display);font-size:clamp(80px,20vw,160px);font-weight:700;color:var(--crimson);line-height:1;text-shadow:0 0 60px var(--crimson-glow);margin-bottom:10px}
    h2{font-family:var(--font-display);font-size:26px;margin-bottom:10px}
    p{color:var(--text-2);margin-bottom:28px;max-width:320px;margin-left:auto;margin-right:auto}
    .home-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--crimson);border-radius:10px;color:#fff;text-decoration:none;font-weight:600;transition:.2s}
    .home-btn:hover{background:var(--crimson-light);transform:translateY(-2px);box-shadow:0 8px 20px var(--crimson-glow)}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div>
  <div class="four">404</div>
  <h2>Page Not Found</h2>
  <p>Looks like this page doesn't exist in the CrimsonZone.</p>
</div>
</body></html>
